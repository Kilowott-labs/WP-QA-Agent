name: "Example WooCommerce Store"
url: "https://staging.example.com"
# username: "qa-agent"
# app_password: "AbCdEfGhIjKlMnOpQrStUvWx"

# Optional: path to local WordPress project
# project_path: "/path/to/wordpress/project"

description: |
  WordPress/WooCommerce site for QA testing.

custom_features:
  - "Custom size guide on product pages"
  - "Wishlist functionality"

critical_flows:
  - "Guest checkout"
  - "User registration and first purchase"

key_pages:
  - name: "Homepage"
    path: "/"
  - name: "Shop"
    path: "/shop/"
  - name: "Cart"
    path: "/cart/"
  - name: "Checkout"
    path: "/checkout/"
  - name: "My Account"
    path: "/my-account/"

known_issues:
  - "Homepage hero image is intentionally large"

run_ecommerce_flow: true
run_auth_flow: true
run_mobile_tests: true
mobile_viewport:
  width: 375
  height: 812
max_links_to_crawl: 30
timeout_ms: 30000
